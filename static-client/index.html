          </div>

            <span class="spotlight-switch-control">
              <input id="spotlight-toggle" type="checkbox" checked />
              <span class="spotlight-switch-slider"></span>
            </span>
          </label>

    <main>
      <div class="top-row top-auth-row">
        <div class="top-auth-content">
          <span id="whoami"></span>
          <button id="logout-btn" type="button" class="hidden">Logout</button>
        </div>
      </div>

      <article class="content" id="content-surface">
        <section id="signed-out-panel" class="auth-wrap card hidden">
          <div class="signed-out-box">
            <img src="./images/person.png" alt="User" class="signed-out-user-icon" />
            <h1>Please sign in!</h1>
            <div class="inline" style="justify-content:center; margin-top:20px;">
              <a class="auth-link-btn" href="./signin.html">Sign In</a>
              <a class="auth-link-btn secondary" href="./signup.html">Sign Up</a>
            </div>
          </div>
        </section>

        <section id="app" class="app-panel hidden">
          <div class="title-row">
            <h3 id="current-list-title">Select a list</h3>
          </div>

          <div id="owner-actions" class="hidden owner-card">
            <form id="rename-form" class="inline">
              <input id="rename-input" type="text" maxlength="50" required />
              <button type="submit">Rename</button>
            </form>
            <form id="invite-form" class="inline">
              <input id="invite-username" type="text" placeholder="Invite username" maxlength="50" required />
              <button type="submit">Invite</button>
            </form>
            <div id="shared-users"></div>
          </div>

          <form id="add-movie-form" class="inline hidden movie-add-form">
            <button type="submit" class="add-btn"><span class="bi bi-plus-circle-fill"></span></button>
            <input id="movie-title-input" type="text" placeholder="Add movie or show" maxlength="120" required />
          </form>

          <div id="movies"></div>
        </section>

        <p id="status"></p>
      </article>
    </main>
